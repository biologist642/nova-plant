<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>چاپتەری ٦ | ئەناتۆمی و مۆرفۆلۆژیا</title>
    <style>
        :root { --primary: #2ecc71; --dark: #0f172a; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f1f5f9; margin: 0; }
        
        .header { height: 250px; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1466692476868-aef1dfb1e735?w=1200'); background-size: cover; display: flex; align-items: center; justify-content: center; color: white; animation: fadeIn 1s; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 40px; max-width: 900px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.4s; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .card:hover { transform: translateY(-10px); background: var(--primary); color: white; }
        
        /* دیزاینی شەیپی خاڵ خاڵ */
        .info-shape { 
            background: white; padding: 30px; border-radius: 15px; 
            border: 2px dashed var(--primary); 
            border-right: 8px solid var(--primary);
            margin: 20px auto; max-width: 800px;
            animation: slideUp 0.6s ease-out;
        }
        .point { display: flex; align-items: center; gap: 10px; margin: 15px 0; }
        .dot { width: 10px; height: 10px; background: var(--primary); border-radius: 50%; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="header"><h1 id="title">ئەناتۆمی و مۆرفۆلۆژیای ڕووەک</h1></header>

    <div class="grid" id="main-menu">
        <div class="card" onclick="showSub()"><h3>شێوەی ڕووەک</h3></div>
        <div class="card" onclick="showSub()"><h3>پێکهاتەی ڕووەک</h3></div>
    </div>

    <div class="grid" id="sub-menu" style="display:none;">
        <div class="card" onclick="loadContent('root')">ڕەگ</div>
        <div class="card">قەد</div>
        <div class="card">گەڵا</div>
        <div class="card">گوڵ</div>
        <div class="card">میوە</div>
    </div>

    <div id="content-area"></div>

    <script>
        function showSub() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('sub-menu').style.display = 'grid';
        }

        function loadContent(type) {
            const area = document.getElementById('content-area');
            if(type === 'root') {
                area.innerHTML = `
                    <div class="info-shape">
                        <h2>ڕەگ (Root)</h2>
                        <p>ڕەگ یەکێکە لە ئەندامە بنچینەیییەکانی ڕووەک...</p>
                        <div class="point"><div class="dot"></div> <b>جێگیرکردن:</b> پاراستنی هاوسەنگی ڕووەک.</div>
                        <div class="point"><div class="dot"></div> <b>مژین:</b> مژینی ئاو و کانزاکان لە ڕێگەی مووەکانەوە.</div>
                        <div class="point"><div class="dot"></div> <b>کڵاوەی ڕەگ:</b> پاراستنی لوتکەی گەشە.</div>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
