<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaPlant - ئەتڵەسی پێشکەوتووی ڕووەک</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Kufi Arabic', sans-serif;
        }

        .hero-container {
            background: linear-gradient(rgba(10, 50, 30, 0.7), rgba(10, 50, 30, 0.7)), 
                        url('https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?q=80&w=1920') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            color: #4ade80;
            letter-spacing: 1px;
        }

        .right-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .theme-toggle, .lang-select {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
        }

        .lang-select option {
            color: black;
        }

        .hero-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .badge {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 20px;
            color: #4ade80;
            font-weight: bold;
        }

        .main-title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 18px;
            color: #e2e8f0;
            margin-bottom: 40px;
            max-width: 600px;
        }

        .start-btn {
            background: #2ecc71;
            color: #0a321e;
            border: none;
            padding: 12px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
            transition: 0.3s ease;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.6);
        }
    </style>
</head>
<body>

    <div class="hero-container">
        
        <header class="navbar">
            <div class="right-controls">
                <button class="theme-toggle">🌙</button>
                <select class="lang-select">
                    <option>Kurdî</option>
                    <option>English</option>
                </select>
            </div>
            <div class="logo">NovaPlant</div>
        </header>

        <main class="hero-content">
            <span class="badge">NOVAPLANT PRO</span>
            <h1 class="main-title">ئەتڵەسی پێشکەوتووی زانستی ڕووەک</h1>
            <p class="subtitle">گەشتێک بۆ ناو جیهانی مۆرفۆلۆژیا، فیسیۆلۆژیا و تاقیگەی بایۆلۆجی</p>
            <button class="start-btn">دەستپێبکە</button>
        </main>

    </div>

</body>
</html>
