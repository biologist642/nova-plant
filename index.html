<!DOCTYPE html>
<html lang="ku" dir="rtl" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioQuest - NovaPlant</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ڕێکخستنی بنەڕەتی */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
            transition: all 0.3s ease;
        }

        /* گۆڕینی فۆنت بەپێی زمان */
        :lang(ku) *, :lang(ar) * {
            font-family: 'Noto Kufi Arabic', sans-serif;
        }
        :lang(en) * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #0d2318; /* باکگراوندێکی سەوزی تۆخی زانستی وەک وێنەی هێرۆکە */
            color: #2c3e50;
        }

        /* بەشی یەکەم: لێواری سەرەکی (Hero Section) وەک وێنە فەرمییەکەت */
        .hero-container {
            background: linear-gradient(rgba(13, 35, 24, 0.7), rgba(13, 35, 24, 0.9)), 
                        url('https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?q=80&w=1920') no-repeat center center/cover;
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            color: white;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 50px;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            color: #4ade80;
        }

        .right-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .lang-select {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            outline: none;
        }

        .lang-select option {
            color: black;
        }

        .hero-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .badge {
            background: rgba(74, 222, 128, 0.15);
            border: 1px solid rgba(74, 222, 128, 0.3);
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 13px;
            color: #4ade80;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .main-title {
            font-size: 46px;
            font-weight: 700;
            margin-bottom: 20px;
            max-width: 900px;
            line-height: 1.5;
        }

        .subtitle {
            font-size: 18px;
            color: #cbd5e1;
            margin-bottom: 40px;
            max-width: 650px;
            line-height: 1.7;
        }

        .start-btn {
            background: #2ecc71;
            color: #0a321e;
            text-decoration: none;
            padding: 14px 45px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .start-btn:hover {
            transform: translateY(-3px);
        }

        /* 🖼️ بەشی سەرەکی کارتە نوێیەکان وەک شێوازی تیکتۆکەکە */
        .chapters-section {
            padding: 100px 50px;
            max-width: 1400px;
            margin: 0 auto;
            background-color: #091a12; /* ڕەنگی بەشی کارتەکان تۆختر کراوە بۆ ئەوەی کارتەکان لێی دەربکەون */
            border-radius: 40px 40px 0 0;
        }

        .section-main-title {
            text-align: center;
            font-size: 34px;
            color: #ffffff;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .section-main-subtitle {
            text-align: center;
            color: #a7f3d0;
            margin-bottom: 70px;
            font-size: 16px;
        }

        /* تۆڕی کارتەکان */
        .chapters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
        }

        /* داهێنانی ستایلی کارتەکان وەک وێنە نوێیەکە */
        .chapter-card {
            background: transparent;
            border-radius: 28px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 440px;
        }

        /* بەشی وێنەی سەرەوەی کارتەکە */
        .card-image-area {
            height: 240px;
            width: 100%;
            overflow: hidden;
            border-radius: 24px;
            position: relative;
        }

        .card-image-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .chapter-card:hover .card-image-area img {
            transform: scale(1.08);
        }

        /* بەشی ناسنامەی چاپتەر لەسەر وێنەکە */
        .card-chapter-tag {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: #4ade80;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        :lang(en) .card-chapter-tag {
            right: auto;
            left: 20px;
        }

        /* 🔲 کارتە سپییەکەی خوارەوە کە دێتە سەر وێنەکە وەک وێنەی نموونەکەت */
        .card-content-box {
            background: #ffffff;
            border-radius: 24px;
            padding: 30px;
            margin: -60px 20px 0 20px; /* جوڵاندنی کارتەکە بەرەو سەر وێنەکە */
            z-index: 2;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
            min-height: 220px;
        }

        .card-title {
            font-size: 20px;
            color: #111827;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title i {
            color: #27ae60;
            font-size: 18px;
        }

        .card-desc {
            font-size: 14px;
            color: #4b5563;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* دوگمەی خوێندنەوە لە خوارەوەی شەیپە سپییەکە */
        .card-footer-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #27ae60;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            width: fit-content;
        }

        .card-footer-btn:hover {
            color: #1e8449;
        }

        .card-footer-btn i {
            font-size: 12px;
        }

        /* 📱 گونجاندن بۆ موبایل */
        @media (max-width: 768px) {
            .navbar {
                padding: 20px;
            }
            .main-title {
                font-size: 32px;
            }
            .chapters-section {
                padding: 60px 15px;
            }
            .chapters-grid {
                grid-template-columns: 1fr;
                gap: 45px;
            }
            .card-content-box {
                margin: -50px 10px 0 10px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <header class="navbar">
            <div class="right-controls">
                <select class="lang-select" id="langChange" onchange="changeLanguage(this.value)">
                    <option value="ku">Kurdî</option>
                    <option value="en">English</option>
                    <option value="ar">العربية</option>
                </select>
            </div>
            <div class="logo">BioQuest</div>
        </header>

        <main class="hero-content">
            <span class="badge" id="hero-badge">BIOQUEST PRO</span>
            <h1 class="main-title" id="hero-title">ئەتڵەسی پێشکەوتووی زانستی ڕووەک</h1>
            <p class="subtitle" id="hero-subtitle">گەشتێک بۆ ناو جیهانی مۆرفۆلۆژیا، فیزیۆلۆژیا و تاقیگەی بایۆلۆجی</p>
            <a href="#chapters-area" class="start-btn" id="hero-btn">دەستپێبکە <i class="fa-solid fa-chevron-down"></i></a>
        </main>
    </div>

    <section id="chapters-area" class="chapters-section">
        <h2 class="section-main-title" id="sec-title">بەشەکانی ماڵپەڕ</h2>
        <p class="section-main-subtitle" id="sec-subtitle">لێرەوە بڕوانەە ناو کایە جیاوازەکانی زانستی ڕووەک و زانیارییەکان</p>

        <div class="chapters-grid" id="grid-container"></div>
    </section>

    <script>
        const translations = {

                dir: "rtl",
                badge: "BIOQUEST PRO",
                title: "ئەتڵەسی پێشکەوتووی زانستی ڕووەک",
                subtitle: "گەشتێک بۆ ناو جیهانی مۆرفۆلۆژیا، فیزیۆلۆژیا و تاقیگەی بایۆلۆجی",
                btn: "دەستپێبکە",
                secTitle: "بەشەکانی پلاتفۆرم",

                    { ch: "Chapter 2", icon: "fa-book-open", img: "https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?q=80&w=600", title: "فەرهەنگی بایۆلۆجی", desc: "فەرهەنگێکی دەوڵەمەندی کوردی-ئینگلیزی بۆ وەرگێڕان و تێگەیشتنی زاراوە بایۆلۆجییەکان." },
                    { ch: "Chapter 3", icon: "fa-feather-alt", img: "https://images.unsplash.com/photo-1532094349884-543bc11b234d?q=80&w=600", title: "لێکۆڵینەوە و وتار", desc: "کۆمەڵێک توێژینەوەی نوێ، وتاری زانستی و بابەتگەلی بڵاوکراوە لەسەر زانستی ڕووەک." },
                    { ch: "Chapter 4", icon: "fa-flask-vial", img: "https://images.unsplash.com/photo-1581093458791-9f3c3900df4b?q=80&w=600", title: "ڕێنمایی تاقیگە و تەکنەلۆژیا", desc: "پڕۆتۆکۆلەکانی تاقیگە، شێوازی کارکردن لەسەر ئامێرەکان و بەکارهێنانی تەکنەلۆژیا لە بایۆلۆجیدا." },
                    { ch: "Chapter 5", icon: "fa-video", img: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=600", title: "ڕوونکردنەوەی ڤیدیۆیی", desc: "بینینی ڤیدیۆی فێرکاری تاقیگەیی، ئەنیمەیشنی سێ ڕەهەندی و شیکردنەوەی پرۆسەکان." },
                    { ch: "Chapter 6", icon: "fa-seedling", img: "https://images.unsplash.com/photo-1523348837708-15d4a09cfac2?q=80&w=600", title: "ئەناتۆمی و مۆرفۆلۆژیای ڕووەک", desc: "تاوتێکردنی پێکهاتە و شێوەی دەرەکی و ناوەوەی ڕەگ، قەد، و گەڵای ڕووەکەکان." },
                    { ch: "Chapter 7", icon: "fa-network-wired", img: "https://images.unsplash.com/photo-1502082553048-f009c37129b9?q=80&w=600", title: "تاکسۆنۆمی و هەمەچەشنی ڕووەک", desc: "پۆلێنکردنی خێزانە ڕووەکییەکان، ناسینەوەی جۆرەکان و فرەچەشنی ڕووەکی." },
                    { ch: "Chapter 8", icon: "fa-dna", img: "https://images.unsplash.com/photo-1530026405186-ed1ea0ac7a63?q=80&w=600", title: "فیزیۆلۆژیای ڕووەک و بایۆکیمیایی", desc: "میکانیزمەکانی ڕۆشنەپێکهاتن، هۆرمۆنە ڕووەکییەکان و کارلێکە کیمیاییەکانی ناو خانەکان." }
                ]
            },
            en: {
                dir: "ltr",
                badge: "BIOQUEST PRO",
                title: "Advanced Botanical Science Atlas",
                subtitle: "A deep journey into the world of plant morphology, physiology, and biological laboratories.",
                btn: "Get Started",
                secTitle: "Platform Chapters",
                secSubtitle: "Explore various domains of plant science and research resources from here.",
                readMore: "Read More",
                arrow: "fa-arrow-right",
                chapters: [
                    { ch: "Chapter 1", icon: "fa-info-circle", img: "https://images.unsplash.com/photo-1463936575829-25148e1db1b8?q=80&w=600", title: "More Information", desc: "About the project, team introduction, our core objectives, and academic relations." },
                    { ch: "Chapter 2", icon: "fa-book-open", img: "https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?q=80&w=600", title: "Biological Dictionary", desc: "A rich multilingual dictionary for translating and understanding complex biological terms." },
                    { ch: "Chapter 3", icon: "fa-feather-alt", img: "https://images.unsplash.com/photo-1532094349884-543bc11b234d?q=80&w=600", title: "Research & Articles", desc: "A collection of modern research papers, scientific articles, and botanical publications." },
                    { ch: "Chapter 4", icon: "fa-flask-vial", img: "https://images.unsplash.com/photo-1581093458791-9f3c3900df4b?q=80&w=600", title: "Lab Guide & Technology", desc: "Laboratory protocols, equipment operation methods, and tech integration in biology." },
                    { ch: "Chapter 5", icon: "fa-video", img: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=600", title: "Video Explanations", desc: "Watch educational lab tutorials, 3D animations, and dynamic biological process breakdowns." },
                    { ch: "Chapter 6", icon: "fa-seedling", img: "https://images.unsplash.com/photo-1523348837708-15d4a09cfac2?q=80&w=600", title: "Plant Anatomy & Morphology", desc: "Detailed study of external morphology and internal anatomy of roots, stems, and leaves." },
                    { ch: "Chapter 7", icon: "fa-network-wired", img: "https://images.unsplash.com/photo-1502082553048-f009c37129b9?q=80&w=600", title: "Taxonomy & Diversity", desc: "Classification of plant families, species identification, and ecological biodiversity." },
                    { ch: "Chapter 8", icon: "fa-dna", title: "Plant Physiology & Biochem", img: "https://images.unsplash.com/photo-1530026405186-ed1ea0ac7a63?q=80&w=600", desc: "Mechanisms of photosynthesis, plant hormones, and cellular chemical reactions." }
                ]
            },
            ar: {
                dir: "rtl",
                badge: "بایوکوێست برو",
                title: "أطلس علوم النبات المتقدم",
                subtitle: "رحلة عميقة في عالم مورفولوجيا النبات، الفسيولوجيا، والمختبرات البيولوجية.",
                btn: "ابدأ الآن",
                secTitle: "أقسام المنصة",
                secSubtitle: "استكشف المجالات المختلفة لعلوم النبات والموارد العلمية من هنا.",
                readMore: "اقرأ المزيد",
                arrow: "fa-arrow-left",
                chapters: [
                    { ch: "الفصل ١", icon: "fa-info-circle", img: "https://images.unsplash.com/photo-1463936575829-25148e1db1b8?q=80&w=600", title: "مزيد من المعلومات", desc: "حول المشروع، التعريف بالفريق، أهدافنا الأساسية، والعلاقات الأكاديمية." },
                    { ch: "الفصل ٢", icon: "fa-book-open", img: "https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?q=80&w=600", title: "القاموس البيولوجي", desc: "قاموس غني ومصطلحات متعددة اللغات لترجمة وفهم المصطلحات البيولوجية المعقدة." },

                    { ch: "الفصل ٤", icon: "fa-flask-vial", img: "https://images.unsplash.com/photo-1581093458791-9f3c3900df4b?q=80&w=600", title: "دليل المختبر والتكنولوجيا", desc: "بروتوكولات المختبر، طرق تشغيل الأجهزة، ودمج التكنولوجيا في علم الأحياء." },

                    { ch: "الفصل ٧", icon: "fa-network-wired", img: "https://images.unsplash.com/photo-1502082553048-f009c37129b9?q=80&w=600", title: "تصنيف وتنوع النبات", desc: "تصنيف العائلات النباتية، تحديد الأنواع، والتنوع البيولوجي البيئي." },
                    { ch: "الفصل ٨", icon: "fa-dna", img: "https://images.unsplash.com/photo-1530026405186-ed1ea0ac7a63?q=80&w=600", title: "فسيولوجيا النبات والكيمياء الحيوية", desc: "آليات البناء الضوئي، الهرمونات النباتية، والتفاعلات الكيميائية الخلوية." }
                ]
            }
        };

        function changeLanguage(lang) {
            const data = translations[lang];
            
            document.getElementById("html-tag").setAttribute("dir", data.dir);
            document.getElementById("html-tag").setAttribute("lang", lang);
            
            document.getElementById("hero-badge").innerText = data.badge;
            document.getElementById("hero-title").innerText = data.title;
            document.getElementById("hero-subtitle").innerText = data.subtitle;
            document.getElementById("hero-btn").innerHTML = data.btn + ' <i class="fa-solid fa-chevron-down"></i>';
            document.getElementById("sec-title").innerText = data.secTitle;
            document.getElementById("sec-subtitle").innerText = data.secSubtitle;
            
            const container = document.getElementById("grid-container");
            container.innerHTML = ""; 
            
            data.chapters.forEach(item => {
                const cardHTML = `
                    <div class="chapter-card">
                        <div class="card-image-area">
                            <span class="card-chapter-tag">${item.ch}</span>
                            <img src="${item.img}" alt="${item.title}">
                        </div>
                        <div class="card-content-box">
                            <div>
                                <h3 class="card-title"><i class="fa-solid ${item.icon}"></i> ${item.title}</h3>
                                <p class="card-desc">${item.desc}</p>
                            </div>
                            <a href="#" class="card-footer-btn">
                                ${data.readMore} <i class="fa-solid ${data.arrow}"></i>
                            </a>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        // دەستپێکردنی سایتەکە بە زمانی کوردی
        changeLanguage('ku');
    </script>
</body>
</html>
